name: TaylorClaw
options:
  bundleIdPrefix: com.catinahat85
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"

targets:
  TaylorClaw:
    type: application
    platform: macOS
    sources:
      - path: TaylorClaw
        excludes:
          - "**/*.md"
    resources:
      - path: TaylorClaw/Resources/Assets.xcassets
    info:
      path: TaylorClaw/Resources/Info.plist
      properties:
        CFBundleName: Taylor Claw
        CFBundleDisplayName: Taylor Claw
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright © 2026 Jake Pineda. MIT License."
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.catinahat85.taylorclaw
        PRODUCT_NAME: "Taylor Claw"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: TaylorClaw/Resources/TaylorClaw.entitlements
    dependencies:
      - package: MarkdownUI

  TaylorClawTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TaylorClawTests
    dependencies:
      - target: TaylorClaw
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Taylor Claw.app/Contents/MacOS/Taylor Claw"

schemes:
  TaylorClaw:
    build:
      targets:
        TaylorClaw: all
        TaylorClawTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TaylorClawTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
